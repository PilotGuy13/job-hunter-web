<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In · AI Job Hunter</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .login-card {
      width: 100%; max-width: 400px; background: #fff;
      border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .login-header {
      background: #1e3a5f; padding: 32px;
      text-align: center; color: #fff;
    }
    .login-header h1 { font-size: 22px; font-weight: 800; margin: 8px 0 4px; }
    .login-header p  { font-size: 13px; opacity: 0.7; margin: 0; }
    .login-body { padding: 32px; }
    .form-label  { font-size: 13px; font-weight: 600; color: #374151; }
    .form-control { border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
    .form-control:focus { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
    .btn-signin {
      background: #1d4ed8; color: #fff; border: none;
      border-radius: 8px; padding: 10px; font-size: 15px; font-weight: 600;
      width: 100%; transition: background 0.15s;
    }
    .btn-signin:hover { background: #1a44c7; }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; font-size: 13px; padding: 10px 14px; }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" type="image/svg+xml">
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div style="font-size:32px;">🔒</div>
      <h1>AI Job Hunter</h1>
      <p>AI-Powered Job Intelligence</p>
    </div>
    <div class="login-body">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert-error mb-3">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-signin">Sign In →</button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('forgot_password') }}" style="font-size:13px;color:#1d4ed8;text-decoration:none;">
          Forgot your password?
        </a>
      </div>
    </div>
  </div>
</body>
</html>
