<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password · AI Job Hunter</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; background: #f8fafc;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      width: 100%; max-width: 420px; background: #fff;
      border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .card-header-block {
      background: #1e3a5f; padding: 28px 32px; text-align: center; color: #fff;
    }
    .card-header-block h1 { font-size: 20px; font-weight: 800; margin: 8px 0 4px; }
    .card-header-block p  { font-size: 13px; opacity: 0.75; margin: 0; }
    .card-body { padding: 28px 32px; }
    .form-label  { font-size: 13px; font-weight: 600; color: #374151; }
    .form-control { border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
    .form-control:focus { border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }
    .btn-submit {
      background: #1d4ed8; color: #fff; border: none; border-radius: 8px;
      padding: 10px; font-size: 15px; font-weight: 600; width: 100%;
    }
    .btn-submit:hover { background: #1a44c7; }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 8px; font-size: 13px; padding: 10px 14px; }
    #pw_feedback { font-size: 13px; margin-top: 6px; display: none; }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" type="image/svg+xml">
</head>
<body>
  <div class="card">
    <div class="card-header-block">
      <div style="font-size:28px;">🔐</div>
      <h1>Reset Password</h1>
      <p>Choose a new password for your account</p>
    </div>
    <div class="card-body">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert-error mb-3">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" id="resetForm">
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" name="password" id="pw1" class="form-control"
                 placeholder="At least 15 characters" oninput="checkPw()" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="password2" id="pw2" class="form-control"
                 placeholder="Re-enter password" oninput="checkPw()" required>
          <div id="pw_feedback"></div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Set New Password →</button>
      </form>

      <div class="text-center mt-4">
        <a href="{{ url_for('login') }}" style="font-size:13px;color:#1d4ed8;text-decoration:none;">
          ← Back to Sign In
        </a>
      </div>
    </div>
  </div>

  <script>
  function checkPw() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    const fb  = document.getElementById('pw_feedback');
    const btn = document.getElementById('submitBtn');

    if (!pw1) { fb.style.display = 'none'; btn.disabled = false; return; }

    fb.style.display = 'block';
    if (pw1.length < 8) {
      fb.textContent = '⚠️ Password must be at least 15 characters.';
      fb.style.color = '#d97706';
      btn.disabled = true;
    } else if (pw2 && pw1 !== pw2) {
      fb.textContent = '❌ Passwords do not match.';
      fb.style.color = '#dc2626';
      btn.disabled = true;
    } else if (pw2 && pw1 === pw2) {
      fb.textContent = '✅ Passwords match.';
      fb.style.color = '#059669';
      btn.disabled = false;
    } else {
      fb.style.display = 'none';
      btn.disabled = false;
    }
  }

  document.getElementById('resetForm').addEventListener('submit', function(e) {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (pw1.length < 8 || pw1 !== pw2) {
      e.preventDefault();
      checkPw();
    }
  });
  </script>
</body>
</html>
