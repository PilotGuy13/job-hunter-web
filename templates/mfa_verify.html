<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verify MFA · AI Job Hunter</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" type="image/svg+xml">
  <style>
    body { min-height:100vh; background:#f8fafc; display:flex; align-items:center; justify-content:center; font-family:-apple-system,sans-serif; }
    .card { width:100%; max-width:400px; background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,0.08); overflow:hidden; }
    .card-top { background:#1e3a5f; padding:28px 32px; text-align:center; color:#fff; }
    .card-top h1 { font-size:20px; font-weight:800; margin:8px 0 4px; }
    .card-body { padding:28px 32px; }
    .btn-verify { background:#1d4ed8; color:#fff; border:none; border-radius:8px; padding:10px; font-size:15px; font-weight:600; width:100%; }
    .btn-verify:hover { background:#1a44c7; }
    .alert-error { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; border-radius:8px; font-size:13px; padding:10px 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <div style="font-size:32px;">🔐</div>
      <h1>Two-Factor Authentication</h1>
      <p style="font-size:13px;opacity:0.75;margin:0;">Enter the code from your authenticator app</p>
    </div>
    <div class="card-body">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert-error mb-3">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-4">
          <input type="text" name="token" class="form-control text-center" maxlength="6"
                 placeholder="000000" style="font-size:28px;letter-spacing:10px;font-weight:700;"
                 autofocus required autocomplete="off">
          <div class="form-text text-center mt-2">Enter the 6-digit code from Google Authenticator or Authy</div>
        </div>
        <button type="submit" class="btn-verify">Verify →</button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" style="font-size:13px;color:#1d4ed8;text-decoration:none;">← Back to Sign In</a>
      </div>
    </div>
  </div>
</body>
</html>
